<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact AIR</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/forms.css">

</head>

<body>

<div id="header"></div>

<!-- ========================================= -->
<!-- PAGE HEADER -->
<!-- ========================================= -->

<section class="page-header">

    <div class="page-header-content">

        <span class="page-tag">

            AFRICAN INDUSTRIAL REVOLUTION

        </span>

        <h1>

            Contact AIR

        </h1>

        <p>

            We'd love to hear from you. Whether you have a question,
            partnership opportunity, project enquiry or simply want
            to learn more about AIR, complete the form below and our
            team will respond as the programme continues to grow.

        </p>

    </div>

</section>

<form id="contactForm">

<div class="form-row">

<div class="form-group">

<label>Full Name</label>

<input type="text"
name="fullname"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input type="email"
name="email"
required>

</div>

</div>

<div class="form-row">

<div class="form-group">

<label>Country</label>

<input type="text"
name="country"
required>

</div>

</div>

<div class="form-group">

<label>Phone / WhatsApp Number</label>

<input type="tel"
name="phone"
required>

</div>

<div class="form-group">

<label>Subject</label>

<input type="text"
name="subject"
required>

</div>

<div class="form-group">

<label>Message</label>

<textarea
rows="8"
name="message"
required></textarea>

</div>

<button type="submit">

Send Message

</button>

</form>

<div id="footer"></div>

<script src="js/includes.js"></script>

</body>

</html>
