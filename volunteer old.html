<!DOCTYPE html>

<html lang="en">

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>African Industrial Revolution (AIR) - Volunteer Registration</title>

<link href="css/style.css" rel="stylesheet"/>
<link href="css/forms.css" rel="stylesheet"/>

</head>
<body>
<div id="header"></div>
<section>
<div class="container">
<h2>Volunteer Registration</h2>
<p class="form-description">
            Join AIR and help empower learners across Africa through mentorship,
            education, technology, research and innovation.
        </p>
<form id="volunteerForm">
<label>Full Name</label>
<input name="fullname" placeholder="Enter your full name" required="" type="text"/>
<label>Email Address</label>
<input name="email" placeholder="Enter your email address" required="" type="email"/>
<label>Country</label>
<input name="country" placeholder="Enter your country" required="" type="text"/>
<label>Profession</label>
<input name="profession" placeholder="Profession or occupation" required="" type="text"/>
<label>Highest Qualification</label>
<input name="qualification" placeholder="Highest qualification obtained" required="" type="text"/>
<label>AIR Programme</label>
<select id="programme" name="programme" required="">
<option value="">Select Programme</option>
<option>AIR Mentorship &amp; Academic Support Network</option>
<option>AIR Tech Academy</option>
<!-- <option>AIR Administration & Support Services</option>-->
</select>
<label>Area of Specialization</label>
<select id="specialization" name="specialization" required="">
<option value="">
        Select Area of Specialization
    </option>
</select>
<label>Qualifications, Experience and Skills</label>
<textarea name="skills" placeholder="Tell us about your qualifications, experience and skills." required="" rows="5"></textarea>
<label>Languages Spoken</label>
<input name="languages" placeholder="Example: English, French, Swahili" type="text"/>
<label>Availability</label>
<select name="availability" required="">
<option value="">Select Availability</option>
<option>Weekdays</option>
<option>Weekends</option>
<option>Evenings</option>
<option>Flexible</option>
</select>
<div class="checkbox-group">
<label>
<input required="" type="checkbox"/>
            I agree to follow AIR policies, code of conduct and safeguarding guidelines.
        </label>
</div>
<div class="checkbox-group">
<label>
<input required="" type="checkbox"/>
            I understand that I am volunteering voluntarily and I am not an employee of AIR.
        </label>
</div>
<button class="btn" type="submit">
        Submit Volunteer Application
    </button>
</form>
</div>
</section>
<div id="footer"></div>
<script>
    //alert("JavaScript Loaded");
// =========================
// DEPENDENT DROPDOWN
// =========================

const programme = document.getElementById("programme");
const specialization = document.getElementById("specialization");

const options = {

    "AIR Mentorship & Academic Support Network": [

        "Mathematics Mentor",
        "Physical Sciences Mentor",
        "Accounting Mentor",
        "Life Sciences Mentor",
        "Geography Mentor",
        "History Mentor",
        "Economics Mentor",
        "Business Studies Mentor",
        "English Mentor",
        "Afrikaans Mentor",
        "French Mentor",
        "Swahili Mentor",
        "Computer Applications Technology Mentor",
        "Information Technology Mentor",
        "Engineering Graphics & Design Mentor",
        "Agricultural Sciences Mentor",
        "Career Guidance Mentor",
        "University Application Advisor",
        "Bursary Advisor"

    ],

    "AIR Tech Academy": [

        "HTML Mentor",
        "CSS Mentor",
        "JavaScript Mentor",
        "Python Mentor",
        "Java Mentor",
        "C++ Mentor",
        "C# Mentor",
        "PHP Mentor",
        "SQL Mentor",
        "Web Development Mentor",
        "Mobile App Development Mentor",
        "Artificial Intelligence Mentor",
        "Machine Learning Mentor",
        "Cybersecurity Mentor",
        "Data Science Mentor",
        "Cloud Computing Mentor",
        "Robotics Mentor",
        "CAD Design Mentor",
        "Engineering Projects Mentor",
        "Research Mentor"

    ]
};

programme.addEventListener("change", function () {

    specialization.innerHTML =
        '<option value="">Select Area of Specialization</option>';

    if (options[this.value]) {

        options[this.value].forEach(function (item) {

            let option = document.createElement("option");

            option.value = item;
            option.textContent = item;

            specialization.appendChild(option);

        });

    }

});

// =========================
// GOOGLE SHEETS SUBMISSION
// =========================

const scriptURL = "https://script.google.com/macros/s/AKfycbz8ktMT1JfcACm2g3TThOHlQ5zBwjBPC2oMgTU0GUNE5KWTdqc4iCDDDuzYWsBhddss/exec";

const form = document.getElementById("volunteerForm");

form.addEventListener("submit", function (e) {

    e.preventDefault();

    const button = form.querySelector("button");

    button.disabled = true;
    button.innerText = "Submitting...";

    const formData = new FormData(form);

    fetch(scriptURL, {
        method: "POST",
        body: formData
    })

    .then(response => {

        alert("Thank you for applying to volunteer with AIR. Your application has been submitted successfully.");

        form.reset();

        button.disabled = false;
        button.innerText = "Submit Volunteer Application";

    })

    .catch(error => {

        alert("An error occurred. Please try again.");

        button.disabled = false;
        button.innerText = "Submit Volunteer Application";

        console.error(error);

    });

});
</script>
<script src="js/includes.js"></script></body>
</html>
</head></html>
