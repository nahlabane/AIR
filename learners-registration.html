<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR - Learner Registration</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="forms.css">
</head>
<body>
<header><div class="container"><h1>African Industrial Revolution (AIR)</h1></div></header>
<section><div class="container">
<h2>Learner Registration</h2>
<a href="index.html" class="btn">← Back to Home</a>
<p class="form-description">Register as a learner to join AIR programmes.</p>

<form id="learnerForm">

<label>Full Name</label>
<input type="text" name="fullname" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Country</label>
<input type="text" name="country" required>

<label>Programme</label>
<select id="programme" name="programme" required>
<option value="">Select Programme</option>
<option>AIR Mentorship & Academic Support Network</option>
<option>AIR Tech Academy</option>
</select>

<div id="mentorshipFields" style="display:none;">
<label>School</label>
<input type="text" name="school">

<label>Grade</label>
<select id="grade" name="grade">
<option value="">Select Grade</option>
<option>Grade 4</option>
<option>Grade 5</option>
<option>Grade 6</option>
<option>Grade 7</option>
<option>Grade 8</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>

<label>Subjects Needed</label>
<div id="subjectsContainer"></div>
</div>

<div id="techFields" style="display:none;">
<label>Age</label>
<input type="number" name="age" min="6" max="100">
</div>

<label>Languages Spoken</label>
<input type="text" name="languages" required>

<label>Availability</label>
<select name="availability" required>
<option value="">Select Availability</option>
<option>Weekdays</option>
<option>Weekends</option>
<option>Evenings</option>
<option>Flexible</option>
</select>

<div class="checkbox-group">
<label><input type="checkbox" required> I confirm that the information provided is accurate.</label>
</div>

<button type="submit" class="btn">Submit Learner Registration</button>
</form>
</div></section>

<footer><div class="container"><p>© 2026 African Industrial Revolution (AIR)</p></div></footer>

<script>
const programme=document.getElementById("programme");
const mentorship=document.getElementById("mentorshipFields");
const tech=document.getElementById("techFields");
programme.addEventListener("change",()=>{
 if(programme.value==="AIR Mentorship & Academic Support Network"){
   mentorship.style.display="block";
   tech.style.display="none";
 }else if(programme.value==="AIR Tech Academy"){
   mentorship.style.display="none";
   tech.style.display="block";
 }else{
   mentorship.style.display="none";
   tech.style.display="none";
 }
});

const subjects={
"Grade 4":["Mathematics","English"],
"Grade 5":["Mathematics","English"],
"Grade 6":["Mathematics","English"],
"Grade 7":["Mathematics","English"],
"Grade 8":["Mathematics","Natural Sciences"],
"Grade 9":["Mathematics","Natural Sciences"],
"Grade 10":["Physical Sciences","Accounting"],
"Grade 11":["Mathematics","Physical Sciences","Accounting"],
"Grade 12":["Mathematics","Physical Sciences","Life Sciences"]
};

const grade=document.getElementById("grade");
const container=document.getElementById("subjectsContainer");

grade.addEventListener("change",()=>{
 container.innerHTML="";
 (subjects[grade.value]||[]).forEach(s=>{
   container.innerHTML += `<label><input type="checkbox" name="subject" value="${s}"> ${s}</label><br>`;
 });
});

const scriptURL="https://script.google.com/macros/s/AKfycbypgQFE4Jdl_TH78b7YcQAoEkUweOFhgRDcnxUs2NDyb_a69gbG3HoklgcjKNtLv-1rPg/exec";
const form=document.getElementById("learnerForm");

form.addEventListener("submit",async(e)=>{
 e.preventDefault();
 const btn=form.querySelector("button");
 btn.disabled=true;
 btn.textContent="Submitting...";
try{

   const fd = new FormData(form);

   await fetch(scriptURL,{
      method:"POST",
      body:fd,
      mode:"no-cors"
   });

   alert("Registration submitted successfully.");

   form.reset();

   container.innerHTML = "";

   mentorship.style.display = "none";
   tech.style.display = "none";

}
 catch(err){
   alert("Submission failed. Please try again.");
   console.error(err);
 }
 btn.disabled=false;
 btn.textContent="Submit Learner Registration";
});
</script>
</body>
</html>
